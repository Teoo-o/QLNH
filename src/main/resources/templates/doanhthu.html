<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Báo Cáo Doanh Thu</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; padding: 20px; margin: 0; }
    .container { max-width: 1000px; margin: 0 auto; }

    /* Nút quay về */
    .nav-bar { padding: 12px 20px; background-color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
    .btn-home { text-decoration: none; font-size: 16px; font-weight: bold; color: #2c3e50; background: #ecf0f1; padding: 8px 15px; border-radius: 5px; border: 1px solid #bdc3c7; }

    /* Thẻ KPI tổng quan */
    .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .kpi-card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; border-left: 5px solid #3498db; }
    .kpi-card h3 { margin: 0; color: #7f8c8d; font-size: 18px; text-transform: uppercase; }
    .kpi-card .number { font-size: 36px; font-weight: bold; color: #2c3e50; margin-top: 10px; }
    .kpi-card.green { border-left-color: #2ecc71; }

    /* Vùng chứa biểu đồ */
    .chart-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #333; margin-top: 0; }
  </style>
</head>
<body>

<div class="container">
  <div class="nav-bar">
    <a href="trangchu.html" class="btn-home">🏠 VỀ TRANG CHỦ</a>
    <span style="color: #9b59b6; font-size: 16px; font-weight: bold;">📊 DÀNH RIÊNG CHO QUẢN LÝ</span>
  </div>

  <h2>BÁO CÁO KẾT QUẢ KINH DOANH</h2>

  <div class="kpi-grid">
    <div class="kpi-card">
      <h3>Tổng Số Đơn Hàng Đã Phục Vụ</h3>
      <div class="number" id="tongSoDon">...</div>
    </div>
    <div class="kpi-card green">
      <h3>Đơn Giao Hàng Qua App (Grab/Shopee)</h3>
      <div class="number" id="donGiaoHang">...</div>
    </div>
  </div>

  <div class="chart-container">
    <canvas id="doanhThuChart" height="100"></canvas>
  </div>
</div>

<script>
  // ==========================================
  // 1. LÍNH CANH PHÂN QUYỀN (QUAN TRỌNG NHẤT)
  // ==========================================
  const userStr = localStorage.getItem('nhanVienDangNhap');
  if(!userStr) {
    alert("🔒 Bạn chưa đăng nhập!");
    window.location.href = "dangnhap.html";
  } else {
    const user = JSON.parse(userStr);
    // KIỂM TRA CHỨC VỤ: Nếu không phải Quản lý thì không được phép!
    if(user.chucVu !== 'Quản lý') {
      alert("⛔ CẢNH BÁO BẢO MẬT:\nTài khoản [" + user.tenNV + "] không có quyền truy cập trang này!\nChỉ Quản Lý mới được xem Doanh Thu.");
      window.location.href = "trangchu.html"; // Sút về trang chủ
    }
  }

  // ==========================================
  // 2. TẢI DỮ LIỆU VÀ VẼ BIỂU ĐỒ
  // ==========================================
  window.onload = function() {
    fetch('http://localhost:8080/api/hoadon')
            .then(response => response.json())
            .then(data => {
              // Đếm tổng số đơn hàng
              document.getElementById('tongSoDon').innerText = data.length + " Đơn";

              // Đếm số đơn giao hàng qua app
              let donApp = 0;
              data.forEach(hd => {
                if(hd.loaiHD === 'Giao hàng') donApp++;
              });
              document.getElementById('donGiaoHang').innerText = donApp + " Đơn";

              // Vẽ biểu đồ doanh Thu 7 ngày gần nhất (Dữ liệu mô phỏng để báo cáo cho đẹp)
              const ctx = document.getElementById('doanhThuChart').getContext('2d');
              new Chart(ctx, {
                type: 'bar', // Biểu đồ cột
                data: {
                  labels: ['Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7', 'Chủ Nhật'],
                  datasets: [{
                    label: 'Biểu đồ lượng khách (Đơn hàng)',
                    data: [12, 19, 15, 22, 29, 45, 38], // Số lượng khách giả lập
                    backgroundColor: 'rgba(52, 152, 219, 0.6)',
                    borderColor: 'rgba(41, 128, 185, 1)',
                    borderWidth: 1
                  }]
                },
                options: { responsive: true, scales: { y: { beginAtZero: true } } }
              });
            })
            .catch(error => {
              console.error("Lỗi:", error);
              document.getElementById('tongSoDon').innerText = "Lỗi mạng";
            });
  };
</script>
</body>
</html>
