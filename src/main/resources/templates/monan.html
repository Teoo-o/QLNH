<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Món Ăn</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        table { border-collapse: collapse; width: 70%; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
        .btn { padding: 8px 12px; text-decoration: none; color: white; background-color: #008CBA; border-radius: 4px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">QUẢN LÝ NHÀ HÀNG</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="/danhmuc">Danh Mục</a></li>
                <li class="nav-item"><a class="nav-link" href="/monan">Món Ăn</a></li>
                <li class="nav-item"><a class="nav-link" href="/banan">Bàn Ăn</a></li>
            </ul>
        </div>
    </div>
</nav>
<h1>Danh sách Món Ăn</h1>
<a href="/monan/them" class="btn">+ Thêm Món Ăn</a>

<table>
    <thead>
    <tr>
        <th>Mã Món</th>
        <th>Tên Món</th>
        <th>Đơn Giá</th>
        <th>Thuộc Danh Mục</th> <th>Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="m : ${dsMonAn}">
        <td th:text="${m.maMon}">1</td>
        <td th:text="${m.tenMon}">Tên món</td>
        <td th:text="${m.donGia} + ' VNĐ'">Giá</td>
        <td th:text="${m.danhMuc != null ? m.danhMuc.tenDM : 'Không có'}">Tên DM</td>
        <td>
            <a th:href="@{/monan/sua/{id}(id=${m.maMon})}" style="color: blue;">Sửa</a> |
            <a th:href="@{/monan/xoa/{id}(id=${m.maMon})}" onclick="return confirm('Xóa món này nhé?');" style="color: red;">Xóa</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
