<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gọi Món - Phục Vụ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; height: 100vh; box-sizing: border-box;}
        .container { display: flex; gap: 15px; height: calc(100vh - 80px); max-width: 1400px; margin: 0 auto; }

        .nav-bar { padding: 12px 20px; background-color: #2980b9; color: white; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin-left: auto; margin-right: auto;}
        .btn-home { text-decoration: none; font-size: 14px; font-weight: bold; color: #2980b9; background: white; padding: 6px 15px; border-radius: 5px; }

        /* Cột Menu */
        .menu-section { flex: 2; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 15px; display: flex; flex-direction: column;}
        .search-bar { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #bdc3c7; border-radius: 5px; margin-bottom: 15px; box-sizing: border-box;}

        .grid-monan { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; overflow-y: auto; padding-right: 5px;}
        .mon-card { border: 1px solid #e0e0e0; border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; transition: 0.2s; background: #fff;}
        .mon-card:hover { border-color: #3498db; box-shadow: 0 4px 8px rgba(52, 152, 219, 0.2); transform: translateY(-2px);}
        .mon-img { width: 100%; height: 100px; background-color: #ecf0f1; border-radius: 4px; margin-bottom: 8px; object-fit: cover;}
        .mon-ten { font-weight: bold; color: #2c3e50; font-size: 14px; margin-bottom: 5px;}
        .mon-gia { color: #e74c3c; font-weight: bold;}

        /* Cột Giỏ hàng */
        .cart-section { flex: 1; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 15px; display: flex; flex-direction: column;}
        .cart-title { font-size: 18px; font-weight: bold; color: #34495e; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 10px; text-align: center;}

        .cart-list { flex-grow: 1; overflow-y: auto; margin-bottom: 15px;}
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed #eee;}
        .sl-btn { width: 25px; height: 25px; border: none; background: #3498db; color: white; border-radius: 3px; cursor: pointer; font-weight: bold;}
        .sl-btn:hover { background: #2980b9; }

        .cart-total { font-size: 20px; font-weight: bold; color: #e74c3c; text-align: right; padding-top: 15px; border-top: 2px solid #eee; margin-bottom: 15px;}
        .btn-order { width: 100%; padding: 15px; background-color: #e67e22; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;}
        .btn-order:hover { background-color: #d35400; }
        .btn-order:disabled { background-color: #95a5a6; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="nav-bar">
    <a href="quanlyban.html" class="btn-home">⬅ QUAY LẠI SƠ ĐỒ BÀN</a>
    <span style="font-size: 16px; font-weight: bold;">📝GỌI MÓN - <span id="tenBanHienThi" style="color:#f1c40f;">Đang chọn...</span></span>
</div>

<div class="container">
    <div class="menu-section">
        <input type="text" id="timKiem" class="search-bar" placeholder="🔍 Tìm kiếm món ăn..." onkeyup="locMonAn()">
        <div class="grid-monan" id="danhSachMon">
            <p style="text-align: center; width: 100%; color: #7f8c8d;">Đang tải thực đơn...</p>
        </div>
    </div>

    <div class="cart-section">
        <div class="cart-title">🛒 Phiếu Gọi Món</div>
        <div class="cart-list" id="gioHang">
        </div>

        <div class="cart-total">
            Tổng cộng: <br><span id="tongTien">0</span> ₫
        </div>
        <button class="btn-order" id="btnChotOrder" disabled onclick="guiOrderXuongBep()">🔥 CHỐT MÓN & GỬI BẾP</button>
    </div>
</div>

<script src="config.js"></script>
<script>
    let maBanDangChon = localStorage.getItem('banDangChon');
    let thucDonToanBo = [];
    let gioHang = [];

    window.onload = function() {
        if(!maBanDangChon) {
            alert("Vui lòng chọn bàn từ sơ đồ trước khi gọi món!");
            window.location.href = "quanlyban.html";
            return;
        }
        document.getElementById('tenBanHienThi').innerText = `BÀN ${maBanDangChon}`;
        taiThucDon();
    };

    function taiThucDon() {
        // Giả định bạn đã có MonAnController với API GET /api/monan
        fetch(`${API_BASE_URL}/monan`)
            .then(res => res.json())
            .then(data => {
                thucDonToanBo = data;
                hienThiMonAn(thucDonToanBo);
            })
            .catch(err => alert("Lỗi tải thực đơn. Hãy đảm bảo MonAnController đã chạy!"));
    }

    function hienThiMonAn(danhSach) {
        const grid = document.getElementById('danhSachMon');
        grid.innerHTML = '';
        danhSach.forEach(mon => {

            // THÊM DẤU CHẤM VÀO TRƯỚC ĐỂ BIẾN THÀNH: ./images/m01.jpg
            let linkAnh = mon.hinhAnh ? "." + mon.hinhAnh : 'https://via.placeholder.com/150?text=Chua+Co+Anh';

            grid.innerHTML += `
                <div class="mon-card" onclick="themVaoGio('${mon.maMon}', '${mon.tenMon}', ${mon.donGia})">
                    <img src="${linkAnh}" class="mon-img" alt="${mon.tenMon}" onerror="this.src='https://via.placeholder.com/150?text=Loi+Anh'">
                    <div class="mon-ten">${mon.tenMon}</div>
                    <div class="mon-gia">${mon.donGia.toLocaleString('vi-VN')} ₫</div>
                </div>
            `;
        });
    }

    function locMonAn() {
        const tuKhoa = document.getElementById('timKiem').value.toLowerCase();
        const ketQua = thucDonToanBo.filter(mon => mon.tenMon.toLowerCase().includes(tuKhoa));
        hienThiMonAn(ketQua);
    }

    function themVaoGio(maMon, tenMon, donGia) {
        const monDaCo = gioHang.find(item => item.maMon === maMon);
        if(monDaCo) {
            monDaCo.soLuong += 1;
        } else {
            gioHang.push({ maMon, tenMon, donGia, soLuong: 1 });
        }
        renderGioHang();
    }

    function thayDoiSoLuong(maMon, soLuongThem) {
        const mon = gioHang.find(item => item.maMon === maMon);
        if(mon) {
            mon.soLuong += soLuongThem;
            if(mon.soLuong <= 0) {
                gioHang = gioHang.filter(item => item.maMon !== maMon);
            }
        }
        renderGioHang();
    }

    function renderGioHang() {
        const list = document.getElementById('gioHang');
        list.innerHTML = '';
        let tongTien = 0;

        gioHang.forEach(item => {
            const thanhTien = item.donGia * item.soLuong;
            tongTien += thanhTien;
            list.innerHTML += `
                <div class="cart-item">
                    <div style="flex:2; font-weight:bold; font-size:14px;">${item.tenMon}</div>
                    <div style="flex:1; display:flex; align-items:center; gap:5px;">
                        <button class="sl-btn" onclick="thayDoiSoLuong('${item.maMon}', -1)">-</button>
                        <span>${item.soLuong}</span>
                        <button class="sl-btn" onclick="thayDoiSoLuong('${item.maMon}', 1)">+</button>
                    </div>
                    <div style="flex:1; text-align:right; color:#e74c3c; font-weight:bold;">
                        ${thanhTien.toLocaleString('vi-VN')}
                    </div>
                </div>
            `;
        });

        document.getElementById('tongTien').innerText = tongTien.toLocaleString('vi-VN');
        document.getElementById('btnChotOrder').disabled = gioHang.length === 0;
    }

    function guiOrderXuongBep() {
        if(gioHang.length === 0) return;

        // Chuẩn bị cục Data để gửi lên API tao-moi
        const payload = {
            maBan: maBanDangChon,
            chiTietList: gioHang.map(item => ({
                maMon: item.maMon,
                soLuong: item.soLuong,
                dongGia: item.donGia
            }))
        };

        fetch(`${API_BASE_URL}/hoadon/tao-moi`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
            .then(async res => {
                if(!res.ok) {
                    const text = await res.text();
                    throw new Error(text);
                }
                alert("✅ Đã chốt Order thành công! Bàn đã chuyển sang trạng thái Có Khách.");
                window.location.href = "quanlyban.html"; // Quay về sơ đồ
            })
            .catch(err => alert("❌ Lỗi tạo Order: " + err.message));
    }
</script>
</body>
</html>
