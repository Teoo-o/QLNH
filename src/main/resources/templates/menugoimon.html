<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Gọi Món - Quản Lí Nhà Hàng</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; display: flex; gap: 20px; }

        /* Nút quay về */
        .nav-bar { padding: 12px 20px; background-color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin-left: auto; margin-right: auto; }
        .btn-home { text-decoration: none; font-size: 16px; font-weight: bold; color: #2c3e50; background: #ecf0f1; padding: 8px 15px; border-radius: 5px; border: 1px solid #bdc3c7; }

        /* Cột trái: Danh sách Món Ăn */
        .menu-section { flex: 2; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        /* Giao diện Lưới (Grid) chứa hình ảnh */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .food-card { border: 1px solid #ddd; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; background: #fff; }
        .food-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.15); border-color: #3498db; }

        .food-img { width: 100%; height: 140px; object-fit: cover; border-bottom: 1px solid #eee; }
        .food-info { padding: 15px; text-align: center; }
        .food-name { font-size: 18px; font-weight: bold; color: #333; margin: 0 0 10px 0; }
        .food-price { color: #e74c3c; font-weight: bold; font-size: 16px; margin: 0; }

        .btn-add { margin-top: 10px; background-color: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 5px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-add:hover { background-color: #2980b9; }

        /* Cột phải: Giỏ hàng */
        .cart-section { flex: 1; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: sticky; top: 20px; height: fit-content; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #ccc; padding: 10px 0; }
        .cart-item-name { font-weight: bold; color: #333; }
        .btn-remove { background: #e74c3c; color: white; border: none; border-radius: 3px; cursor: pointer; padding: 2px 6px; }

        .total-box { margin-top: 20px; font-size: 20px; font-weight: bold; text-align: right; color: #2c3e50; }
        .btn-checkout { width: 100%; padding: 15px; background-color: #2ecc71; color: white; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-checkout:hover { background-color: #27ae60; }
    </style>
</head>
<body>

<script>
    if(!localStorage.getItem('nhanVienDangNhap')) {
        alert("🔒 Bạn chưa đăng nhập! Vui lòng quay lại cổng an ninh.");
        window.location.href = "dangnhap.html";
    }
</script>

<div class="nav-bar">
    <a href="trangchu.html" class="btn-home">🏠 VỀ TRANG CHỦ</a>
    <span style="color: #7f8c8d; font-size: 16px; font-weight: bold;">Quản Lí Nhà Hàng - Bộ Phận Order</span>
</div>

<div class="container">
    <div class="menu-section">
        <h2>🍔 DANH MỤC MÓN ĂN</h2>
        <div class="menu-grid" id="menuGrid">
            <p style="text-align: center; width: 100%; color: #666;">Đang tải thực đơn từ máy bếp...</p>
        </div>
    </div>

    <div class="cart-section">
        <h2>🛒 GIỎ HÀNG CỦA BẠN</h2>
        <div id="cartItems">
            <p style="text-align: center; color: #999; font-style: italic;">Chưa chọn món nào</p>
        </div>
        <div class="total-box">
            Tổng tiền: <span id="tongTien" style="color: #e74c3c;">0</span> đ
        </div>
        <button class="btn-checkout" onclick="guiOrderXuongBackend()">CHỐT ĐƠN / TẠO HÓA ĐƠN</button>
    </div>
</div>

<script>
    let gioHang = [];
    let tongTien = 0;

    window.onload = function() {
        // Gọi API lấy danh sách món ăn từ Backend
        fetch('http://localhost:8080/api/monan')
            .then(response => response.json())
            .then(data => {
                const grid = document.getElementById('menuGrid');
                grid.innerHTML = ''; // Xóa chữ loading

                data.forEach(mon => {
                    const giaTien = mon.dongGia;

                    // 2. LINK ẢNH WIKIPEDIA (Tránh vỡ ảnh)
                    let hinhAnhLink = "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6d/Good_Food_Display_-_NCI_Visuals_Online.jpg/500px-Good_Food_Display_-_NCI_Visuals_Online.jpg"; // Ảnh mặc định
                    const tenMonLower = mon.tenMon.toLowerCase();

                    if (tenMonLower.includes('phở') || tenMonLower.includes('bún')) {
                        hinhAnhLink = "https://upload.wikimedia.org/wikipedia/commons/5/53/Pho-Beef-Noodles-2008.jpg"; // Ảnh tô Phở xịn
                    } else if (tenMonLower.includes('trà') || tenMonLower.includes('nước')) {
                        hinhAnhLink = "https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=500"; // Ảnh ly nước
                    }

                    // 3. TẠO GIAO DIỆN
                    const card = document.createElement('div');
                    card.className = 'food-card';
                    card.onclick = () => themVaoGio(mon.maMon, mon.tenMon, giaTien);

                    card.innerHTML = `
                            <img src="${hinhAnhLink}" class="food-img" alt="${mon.tenMon}">
                            <div class="food-info">
                                <h3 class="food-name">${mon.tenMon}</h3>
                                <p class="food-price">${giaTien.toLocaleString('vi-VN')} đ</p>
                                <button class="btn-add">Thêm Vào Giỏ</button>
                            </div>
                        `;
                    grid.appendChild(card);
                });
            })
            .catch(error => {
                console.error("Lỗi:", error);
                document.getElementById('menuGrid').innerHTML = '<p style="color:red; text-align:center;">Lỗi kết nối đến máy chủ!</p>';
            });
    };

    // Hàm thêm món vào giỏ
    function themVaoGio(maMon, tenMon, donGia) {
        const index = gioHang.findIndex(item => item.maMon === maMon);
        if(index !== -1) {
            gioHang[index].soLuong++; // Nếu có rồi thì tăng số lượng
        } else {
            gioHang.push({ maMon: maMon, tenMon: tenMon, dongGia: donGia, soLuong: 1 });
        }
        capNhatGiaoDienGioHang();
    }

    // Hàm xóa bớt món
    function xoaKhoiGio(maMon) {
        gioHang = gioHang.filter(item => item.maMon !== maMon);
        capNhatGiaoDienGioHang();
    }

    // Hàm vẽ lại giỏ hàng và tính tổng tiền
    function capNhatGiaoDienGioHang() {
        const cartDiv = document.getElementById('cartItems');
        cartDiv.innerHTML = '';
        tongTien = 0;

        if(gioHang.length === 0) {
            cartDiv.innerHTML = '<p style="text-align: center; color: #999; font-style: italic;">Chưa chọn món nào</p>';
        }

        gioHang.forEach(item => {
            tongTien += (item.dongGia * item.soLuong);
            cartDiv.innerHTML += `
                    <div class="cart-item">
                        <div>
                            <span class="cart-item-name">${item.tenMon}</span><br>
                            <span style="color: #666; font-size: 14px;">SL: ${item.soLuong} x ${item.dongGia.toLocaleString('vi-VN')} đ</span>
                        </div>
                        <button class="btn-remove" onclick="xoaKhoiGio('${item.maMon}')">X</button>
                    </div>
                `;
        });
        document.getElementById('tongTien').innerText = tongTien.toLocaleString('vi-VN');
    }

    // Hàm chốt đơn bắn xuống Backend Java
    function guiOrderXuongBackend() {
        if(gioHang.length === 0) {
            alert("Giỏ hàng đang trống! Vui lòng chọn món."); return;
        }

        const payload = {
            loaiHD: "Tại chỗ",
            pttt: "Chưa thanh toán",
            chiTietList: gioHang.map(item => ({
                maMon: item.maMon,
                soLuong: item.soLuong,
                dongGia: item.dongGia
            }))
        };

        fetch('http://localhost:8080/api/hoadon/tao-moi', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
            .then(response => {
                if(!response.ok) throw new Error("Lỗi khi tạo hóa đơn!");
                return response.json();
            })
            .then(data => {
                alert("✅ CHỐT ĐƠN THÀNH CÔNG!\nMã Hóa Đơn của khách là: " + data.maHD + "\nHãy sang mục Tính Tiền để thanh toán nhé.");
                gioHang = [];
                capNhatGiaoDienGioHang();
            })
            .catch(error => {
                alert("❌ Có lỗi xảy ra: " + error.message);
            });
    }
</script>
</body>
</html>
