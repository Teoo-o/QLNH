<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Quản Lý Nhà Hàng</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        .login-box h2 { margin-top: 0; color: #333; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; color: #666; font-weight: bold; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .btn-login { width: 100%; padding: 12px; background-color: #e74c3c; color: white; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-login:hover { background-color: #c0392b; }
        #errorMsg { color: red; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>🔥 ĐĂNG NHẬP QUẢN LÝ NHÀ HÀNG</h2>
    <div class="input-group">
        <label>Tài khoản</label>
        <input type="text" id="taiKhoan" placeholder="Nhập tài khoản...">
    </div>
    <div class="input-group">
        <label>Mật khẩu</label>
        <input type="password" id="matKhau" placeholder="Nhập mật khẩu...">
    </div>
    <button class="btn-login" onclick="xuLyDangNhap()">ĐĂNG NHẬP</button>
    <p id="errorMsg">Sai tài khoản hoặc mật khẩu!</p>
</div>

<script src="config.js"></script>

<script>
    function xuLyDangNhap() {
        const tk = document.getElementById('taiKhoan').value;
        const mk = document.getElementById('matKhau').value;

        if(!tk || !mk) { alert("Vui lòng nhập đủ thông tin!"); return; }

        // ĐÃ GỠ BOM: Sử dụng biến API_BASE_URL
        fetch(`${API_BASE_URL}/nhanvien/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ taiKhoan: tk, matKhau: mk })
        })
            .then(response => {
                if(!response.ok) throw new Error("Sai thông tin");
                return response.json();
            })
            .then(data => {
                localStorage.setItem('nhanVienDangNhap', JSON.stringify(data));
                alert("Xin chào " + data.chucVu + ": " + data.tenNV);
                window.location.href = "trangchu.html";
            })
            .catch(error => {
                document.getElementById('errorMsg').style.display = 'block';
            });
    }
</script>

</body>
</html>
