<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm/Sửa Bàn Ăn</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .form-box { border: 1px solid #ccc; padding: 20px; width: 350px; }
        input, select { width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box; }
        button { padding: 10px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
<h2>Thông Tin Bàn Ăn</h2>
<div class="form-box">
    <form th:action="@{/banan/luu}" th:object="${banAnMoi}" method="post">
        <input type="hidden" th:field="*{maBan}" />

        <label>Tên bàn (Ví dụ: Bàn 01, Bàn VIP):</label>
        <input type="text" th:field="*{tenBan}" required />

        <label>Trạng thái hiện tại:</label>
        <select th:field="*{trangThai}">
            <option value="Trống">Trống</option>
            <option value="Có khách">Có khách</option>
            <option value="Đã đặt trước">Đã đặt trước</option>
        </select>

        <button type="submit" style="margin-top: 15px;">Lưu Bàn</button>
        <a href="/banan" style="margin-left: 10px;">Hủy</a>
    </form>
</div>
</body>
</html>
