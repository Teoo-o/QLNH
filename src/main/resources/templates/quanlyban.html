<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sơ Đồ Bàn Ăn - Quản Lí Nhà Hàng</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; padding: 20px; margin: 0;}
    .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }

    .nav-bar { padding: 12px 20px; background-color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin-left: auto; margin-right: auto;}
    .btn-home { text-decoration: none; font-size: 16px; font-weight: bold; color: #2c3e50; background: #ecf0f1; padding: 8px 15px; border-radius: 5px; border: 1px solid #bdc3c7; }

    .legend { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; padding: 10px; background: #f8f9fa; border-radius: 8px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-weight: bold; }
    .box { width: 20px; height: 20px; border-radius: 4px; border: 1px solid #ccc; }
    .box.trong { background: #2ecc71; }
    .box.cokhach { background: #e74c3c; }
    .box.dadat { background: #f1c40f; }

    .khu-vuc { margin-bottom: 30px; }
    .khu-vuc-title { font-size: 20px; color: #34495e; border-left: 5px solid #3498db; padding-left: 10px; margin-bottom: 15px; }

    .grid-ban { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }

    .ban-card {
      height: 120px; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center;
      cursor: pointer; transition: 0.3s; color: white; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; border: 2px solid rgba(0,0,0,0.1);
    }
    .ban-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
    .ban-name { font-size: 24px; margin-bottom: 5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
    .ban-info { font-size: 14px; opacity: 0.9; }

    /* Chỉnh màu cho giống các phần mềm thương mại */
    .ban-trong { background: linear-gradient(135deg, #2ecc71, #27ae60); }
    .ban-cokhach { background: linear-gradient(135deg, #e74c3c, #c0392b); }
    .ban-dadat { background: linear-gradient(135deg, #f1c40f, #f39c12); color: #333; }
  </style>
</head>
<body>

<div class="nav-bar">
  <a href="trangchu.html" class="btn-home">🏠 VỀ TRANG CHỦ</a>
  <span style="color: #3498db; font-size: 16px; font-weight: bold;">🗺️ SƠ ĐỒ BÀN ĂN</span>
</div>

<div class="container">
  <h2>Sơ Đồ Hoạt Động Của Nhà Hàng</h2>

  <div class="legend">
    <div class="legend-item"><div class="box trong"></div> Trống (Sẵn sàng)</div>
    <div class="legend-item"><div class="box cokhach"></div> Có khách (Đang phục vụ)</div>
    <div class="legend-item"><div class="box dadat"></div> Đã đặt (Chờ khách tới)</div>
  </div>

  <div id="soDoNhaHang">
    <p style="text-align: center; color: #666;">Đang tải sơ đồ bàn từ máy chủ...</p>
  </div>
</div>

<script src="config.js"></script>
<script>
  if(!localStorage.getItem('nhanVienDangNhap')) {
    alert("🔒 Bạn chưa đăng nhập!"); window.location.href = "dangnhap.html";
  }

  window.onload = function() {
    taiSoDoBan();
  };

  function taiSoDoBan() {
    fetch(`${API_BASE_URL}/banan`) // Giả định bạn đã có API GET /api/banan
            .then(res => res.json())
            .then(data => {
              const container = document.getElementById('soDoNhaHang');
              container.innerHTML = '';

              // Lọc bỏ bàn đã xóa mềm
              const banDangDung = data.filter(b => !b.daXoa);

              // Nhóm bàn theo khu vực (Ví dụ: Tầng 1, Tầng 2)
              const khuVucMap = new Map();
              banDangDung.forEach(ban => {
                const kv = ban.khuVuc || 'Khu vực chung';
                if(!khuVucMap.has(kv)) khuVucMap.set(kv, []);
                khuVucMap.get(kv).push(ban);
              });

              // Render từng khu vực
              khuVucMap.forEach((danhSachBan, tenKhuVuc) => {
                const khuVucDiv = document.createElement('div');
                khuVucDiv.className = 'khu-vuc';

                khuVucDiv.innerHTML = `<div class="khu-vuc-title">${tenKhuVuc}</div>`;

                const gridDiv = document.createElement('div');
                gridDiv.className = 'grid-ban';

                danhSachBan.forEach(ban => {
                  let classMau = 'ban-trong';
                  let thaoTac = `chuyenSangGoiMon('${ban.maBan}')`; // Bàn trống thì sang Menu để order

                  if(ban.status === 'Có khách') {
                    classMau = 'ban-cokhach';
                    thaoTac = `chuyenSangTinhTien('${ban.maBan}')`; // Bàn có khách thì sang Tính tiền
                  } else if(ban.status === 'Đã đặt') {
                    classMau = 'ban-dadat';
                    thaoTac = `chuyenSangDatBan()`; // Bàn đã đặt thì sang ds đặt bàn xem ai đặt
                  }

                  gridDiv.innerHTML += `
                            <div class="ban-card ${classMau}" onclick="${thaoTac}">
                                <div class="ban-name">${ban.maBan}</div>
                                <div class="ban-info">${ban.soGhe} ghế</div>
                                <div style="font-size: 12px; margin-top: 5px;">${ban.status}</div>
                            </div>
                        `;
                });

                khuVucDiv.appendChild(gridDiv);
                container.appendChild(khuVucDiv);
              });
            })
            .catch(err => {
              document.getElementById('soDoNhaHang').innerHTML = '<p style="color:red; text-align:center;">Lỗi tải sơ đồ bàn!</p>';
            });
  }

  // Các hàm điều hướng thông minh y hệt Nhahang.ai
  function chuyenSangGoiMon(maBan) {
    // Lưu tạm mã bàn vào localStorage để trang Menu biết order cho bàn nào
    localStorage.setItem('banDangChon', maBan);
    window.location.href = "menugoimon.html";
  }

  function chuyenSangTinhTien(maBan) {
    localStorage.setItem('banDangChon', maBan);
    window.location.href = "maytinhtien.html";
  }

  function chuyenSangDatBan() {
    window.location.href = "danhsachdatban.html";
  }
</script>
</body>
</html>
