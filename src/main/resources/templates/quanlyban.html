<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sơ Đồ Bàn Ăn Nhà Hàng</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; }

    .ghi-chu { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
    .dot { height: 15px; width: 15px; border-radius: 50%; display: inline-block; vertical-align: middle; margin-right: 5px; }
    .bg-trong { background-color: #28a745; }
    .bg-co-khach { background-color: #dc3545; }
    .bg-da-dat { background-color: #ffc107; }

    .ban-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
    .ban-card { border: 2px solid #ddd; border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; color: white; font-weight: bold; }
    .ban-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    .ban-card h3 { margin: 0 0 10px 0; font-size: 24px; }
    .ban-card p { margin: 0; font-size: 14px; font-weight: normal; }

    /* Màu sắc động dựa theo trạng thái */
    .status-Trong { background-color: #28a745; border-color: #218838; }
    .status-CoKhach { background-color: #dc3545; border-color: #c82333; }
    .status-DaDat { background-color: #ffc107; border-color: #e0a800; color: #333; }
  </style>
</head>
<body>

<div style="padding: 12px 20px; background-color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center;">
  <a href="trangchu.html" style="text-decoration: none; font-size: 16px; font-weight: bold; color: #2c3e50; background: #ecf0f1; padding: 8px 15px; border-radius: 5px; border: 1px solid #bdc3c7;">
    🏠 VỀ TRANG CHỦ
  </a>
  <span style="color: #7f8c8d; font-size: 14px; font-weight: bold;">Quản Lí Nhà Hàng</span>
</div>

<div class="container">
  <h2>🗺️ Sơ Đồ Bàn Ăn Trực Tuyến</h2>

  <div class="ghi-chu">
    <div><span class="dot bg-trong"></span> Bàn Trống</div>
    <div><span class="dot bg-co-khach"></span> Đang Có Khách</div>
    <div><span class="dot bg-da-dat"></span> Đã Đặt Trước</div>
  </div>

  <div class="ban-grid" id="banGrid">
    <p style="text-align: center; width: 100%; color: #666;">Đang đồng bộ dữ liệu với máy chủ...</p>
  </div>
</div>

<script>
  //Kiểm tra xem đã đăng nhập chưa
  if(!localStorage.getItem('nhanVienDangNhap')) {
    alert("🔒 Bạn chưa đăng nhập! Vui lòng quay lại cổng an ninh.");
    window.location.href = "dangnhap.html";
  }
  window.onload = function() {
    // Gọi API lấy danh sách bàn từ Spring Boot
    fetch('http://localhost:8080/api/banan')
            .then(response => response.json())
            .then(data => {
              const banGrid = document.getElementById('banGrid');
              banGrid.innerHTML = ''; // Xóa chữ loading

              data.forEach(ban => {
                // Xử lý chuỗi tiếng Việt có dấu thành class CSS không dấu
                let statusClass = "status-Trong"; // Mặc định
                if (ban.status === "Có khách") statusClass = "status-CoKhach";
                if (ban.status === "Đã đặt") statusClass = "status-DaDat";

                // Vẽ từng cái bàn ra HTML
                const card = document.createElement('div');
                card.className = `ban-card ${statusClass}`;
                card.onclick = () => alert(`Khu vực: ${ban.khuVuc}\nSố ghế: ${ban.soGhe}\nTrạng thái: ${ban.status}`);

                card.innerHTML = `
                        <h3>Bàn ${ban.maBan}</h3>
                        <p>${ban.soGhe} người</p>
                        <p style="margin-top: 10px; font-style: italic;">${ban.status}</p>
                    `;
                banGrid.appendChild(card);
              });
            })
            .catch(error => {
              console.error("Lỗi:", error);
              document.getElementById('banGrid').innerHTML = '<p style="color:red; text-align:center;">Lỗi kết nối đến máy chủ!</p>';
            });
  };
</script>

</body>
</html>
