<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiết Hóa Đơn</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .khu-vuc-goi-mon { border: 2px solid #ff9800; padding: 15px; background-color: #fff9e6; margin-bottom: 20px; width: 70%;}
        table { border-collapse: collapse; width: 75%; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
        .tong-tien { font-size: 24px; color: red; font-weight: bold; margin-top: 20px;}
    </style>
</head>
<body>
<a href="/hoadon" style="text-decoration: none; color: blue;">⬅ Quay lại danh sách Hóa Đơn</a>

<h2>Bàn Đang Phục Vụ: <span th:text="${hoaDon.banAn.tenBan}" style="color: #4CAF50; text-transform: uppercase;"></span></h2>
<p>Mã HĐ: <strong th:text="${hoaDon.maHD}"></strong> | Trạng thái: <strong th:text="${hoaDon.trangThai}"></strong></p>

<div class="khu-vuc-goi-mon" th:if="${hoaDon.trangThai == 'Chưa thanh toán'}">
    <h3 style="margin-top: 0;">Thêm món mới</h3>
    <form th:action="@{/hoadon/them-mon}" method="post">
        <input type="hidden" name="maHD" th:value="${hoaDon.maHD}" />

        <label>Chọn món:</label>
        <select name="maMon" required style="padding: 5px; width: 250px; font-size: 16px;">
            <option value="">-- Mở Menu --</option>
            <option th:each="m : ${dsMonAn}"
                    th:value="${m.maMon}"
                    th:text="${m.tenMon} + ' (' + ${m.donGia} + ' đ)'"></option>
        </select>

        <label style="margin-left: 15px;">Số lượng:</label>
        <input type="number" name="soLuong" value="1" min="1" required style="padding: 5px; width: 60px; font-size: 16px;" />

        <button type="submit" style="background-color: #ff9800; color: white; padding: 7px 15px; border: none; cursor: pointer; margin-left: 15px; font-weight: bold; font-size: 15px;">
            + Thêm vào bàn
        </button>
    </form>
</div>

<h3>Danh sách món khách đã gọi</h3>
<table>
    <thead>
    <tr>
        <th>STT</th>
        <th>Tên Món</th>
        <th>Đơn Giá</th>
        <th>Số Lượng</th>
        <th>Thành Tiền</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="ct, stt : ${dsMonDaGoi}">
        <td th:text="${stt.count}">1</td>
        <td th:text="${ct.monAn.tenMon}" style="font-weight: bold;">Tên món</td>
        <td th:text="${ct.donGia}">Giá</td>
        <td th:text="${ct.soLuong}">SL</td>
        <td th:text="${ct.donGia * ct.soLuong} + ' VNĐ'">Thành tiền</td>
    </tr>
    <tr th:if="${#lists.isEmpty(dsMonDaGoi)}">
        <td colspan="5" style="text-align: center; color: gray; font-style: italic;">Khách chưa gọi món nào. Hãy chọn món ở trên.</td>
    </tr>
    </tbody>
</table>

<div class="tong-tien">
    TỔNG CỘNG: <span th:text="${hoaDon.tongTien} + ' VNĐ'"></span>
    <div th:if="${hoaDon.trangThai == 'Chưa thanh toán'}" style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #ccc;">
        <form th:action="@{/hoadon/thanhtoan}" method="post" onsubmit="return confirm('Xác nhận thu tiền và Đóng bàn này?');">
            <input type="hidden" name="maHD" th:value="${hoaDon.maHD}" />

            <button type="submit"
                    style="background-color: #f44336; color: white; padding: 12px 25px; font-size: 18px; font-weight: bold; border: none; cursor: pointer; border-radius: 5px;">
                💰 THANH TOÁN & TRẢ BÀN
            </button>
        </form>
    </div>

    <div th:if="${hoaDon.trangThai == 'Đã thanh toán'}" style="margin-top: 30px; padding: 20px; background-color: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; font-weight: bold; text-align: center; width: 70%;">
        ✅ HÓA ĐƠN NÀY ĐÃ ĐƯỢC THANH TOÁN (Lịch sử đã đóng)
    </div>
</div>

</body>
</html>
