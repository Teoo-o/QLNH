<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Nhà Hàng</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 20px 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .user-name { font-weight: bold; color: #e67e22; font-size: 18px; }
        .chuc-vu { font-size: 14px; color: #7f8c8d; font-style: italic; }
        .btn-logout { background-color: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .menu-card { background: white; padding: 30px 20px; border-radius: 15px; text-align: center; text-decoration: none; color: inherit; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid #ecf0f1; display: none; }
        .menu-card:hover { transform: translateY(-8px); box-shadow: 0 12px 20px rgba(0,0,0,0.15); border-color: #3498db; }
        .icon { font-size: 55px; margin-bottom: 15px; display: inline-block; }
        .title { margin: 0 0 10px 0; color: #2c3e50; font-size: 22px; font-weight: bold; }

        /* Màu sắc nhận diện các nút */
        .card-ban { border-bottom: 4px solid #3498db; }
        .card-datban { border-bottom: 4px solid #9b59b6; }
        .card-thucdon { border-bottom: 4px solid #1abc9c; }
        .card-kho { border-bottom: 4px solid #e67e22; }
        .card-nhansu { border-bottom: 4px solid #2ecc71; }
        .card-baocao { border-bottom: 4px solid #f1c40f; }
        .card-km { border-bottom: 4px solid #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-left"><h1>Hệ Thống Nhà Hàng</h1></div>
        <div class="user-info" style="display: flex; align-items: center; gap: 20px;">
            <div style="text-align: right;">
                <span class="user-name">👋 <span id="tenNhanVien">...</span></span><br>
                <span class="chuc-vu" id="chucVuTxt">...</span>
            </div>
            <button class="btn-logout" onclick="dangXuat()">Đăng Xuất</button>
        </div>
    </div>

    <div class="dashboard-grid">
        <a href="quanlyban.html" class="menu-card card-ban role-phucvu role-thungan">
            <div class="icon">🍽️</div><h3 class="title">Sơ Đồ Bàn Ăn</h3>
        </a>

        <a href="danhsachdatban.html" class="menu-card card-datban role-phucvu">
            <div class="icon">📅</div><h3 class="title">Danh Sách Đặt Bàn</h3>
        </a>

        <a href="quanlythucdon.html" class="menu-card card-thucdon role-daubep role-beptruong">
            <div class="icon">🍔</div><h3 class="title">Quản Lý Thực Đơn</h3>
        </a>

        <a href="quanlykho.html" class="menu-card card-kho role-beptruong">
            <div class="icon">📦</div><h3 class="title">Quản Lý Kho</h3>
        </a>

        <a href="quanlykhuyenmai.html" class="menu-card card-km role-thungan">
            <div class="icon">🎁</div><h3 class="title">Quản Lý Khuyến Mãi</h3>
        </a>
        <a href="baocaodoanhthu.html" class="menu-card card-baocao role-thungan">
            <div class="icon">📊</div><h3 class="title">Báo Cáo Doanh Thu</h3>
        </a>

        <a href="quanlynhansu.html" class="menu-card card-nhansu role-admin">
            <div class="icon">👥</div><h3 class="title">Quản Lý Nhân Sự</h3>
        </a>
    </div>
</div>

<script>
    const userStr = localStorage.getItem('nhanVienDangNhap');
    if(!userStr) {
        window.location.href = "dangnhap.html";
    } else {
        const userObj = JSON.parse(userStr);
        document.getElementById('tenNhanVien').innerText = userObj.tenNV || userObj.taiKhoan;

        const chucVuRaw = userObj.chucVu || 'Nhân viên';
        document.getElementById('chucVuTxt').innerText = `Chức vụ: ${chucVuRaw}`;

        // Chuẩn hóa chữ thường để so sánh
        const chucVu = chucVuRaw.toLowerCase().trim();

        // LOGIC PHÂN QUYỀN MỚI
        if (chucVu === 'admin' || chucVu === 'quản lý') {
            // Admin thấy tất cả
            document.querySelectorAll('.menu-card').forEach(el => el.style.display = 'block');
        } else if (chucVu === 'phục vụ') {
            document.querySelectorAll('.role-phucvu').forEach(el => el.style.display = 'block');
        } else if (chucVu === 'thu ngân') {
            document.querySelectorAll('.role-thungan').forEach(el => el.style.display = 'block');
        } else if (chucVu === 'bếp trưởng') {
            // Bếp trưởng thấy cả Thực đơn và Kho
            document.querySelectorAll('.role-beptruong').forEach(el => el.style.display = 'block');
        } else if (chucVu === 'đầu bếp') {
            // Đầu bếp CHỈ thấy Thực đơn
            document.querySelectorAll('.role-daubep').forEach(el => el.style.display = 'block');
        }
    }

    function dangXuat() {
        if(confirm("Bạn có chắc chắn muốn đăng xuất?")) {
            localStorage.clear();
            window.location.href = "dangnhap.html";
        }
    }
</script>
</body>
</html>
