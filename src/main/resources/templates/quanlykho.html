<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Kho Nguyên Liệu</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; padding: 20px; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .header h2 { margin: 0; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #34495e; color: white; }
        tr:hover { background-color: #f1f1f1; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; transition: 0.2s; }
        .btn-nhap { background-color: #3498db; }
        .btn-home { background-color: #ecf0f1; color: #333; text-decoration: none; padding: 10px 15px; border-radius: 5px; font-weight: bold;}
        .status-het { color: #e74c3c; font-weight: bold; background: #fdedec; padding: 5px 10px; border-radius: 20px; font-size: 13px; }
        .status-con { color: #27ae60; font-weight: bold; background: #e8f6f3; padding: 5px 10px; border-radius: 20px; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>📦 Quản Lý Kho & Nguyên Liệu</h2>
        <a href="trangchu.html" class="btn-home">🏠 Về Trang Chủ</a>
    </div>

    <table id="khoTable">
        <thead>
        <tr>
            <th>Mã NL</th>
            <th>Tên Nguyên Liệu</th>
            <th>Số Lượng Tồn</th>
            <th>Đơn Vị</th>
            <th>Trạng Thái</th>
            <th>Thao Tác</th>
        </tr>
        </thead>
        <tbody id="khoBody">
        <tr><td colspan="6">Đang tải dữ liệu kho...</td></tr>
        </tbody>
    </table>
</div>

<script src="config.js"></script>
<script>
    const userStr = localStorage.getItem('nhanVienDangNhap');
    if(!userStr) {
        window.location.href = "dangnhap.html";
    } else {
        const user = JSON.parse(userStr);
        const chucVu = user.chucVu.toLowerCase().trim();
        if(chucVu !== 'admin' && chucVu !== 'quản lý' && chucVu !== 'bếp trưởng') {
            alert("⛔ QUYỀN TRUY CẬP BỊ TỪ CHỐI!\nChỉ có Quản lý hoặc Bếp trưởng mới được vào khu vực Kho.");
            window.location.href = "trangchu.html";
        }
    }

    window.onload = taiDanhSachKho;

    function taiDanhSachKho() {
        fetch(`${API_BASE_URL}/kho`)
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('khoBody');
                tbody.innerHTML = '';
                data.forEach(nl => {
                    const statusHTML = nl.sl <= 0
                        ? '<span class="status-het">Hết hàng</span>'
                        : '<span class="status-con">Còn hàng</span>';

                    const slDinhDang = Number(nl.sl.toFixed(2)).toLocaleString('vi-VN');

                    tbody.innerHTML += `
                        <tr>
                            <td><b>${nl.maNL}</b></td>
                            <td style="text-align: left; padding-left: 20px;">${nl.tenNL}</td>
                            <td style="font-weight: bold; font-size: 16px;">${slDinhDang}</td>
                            <td>${nl.donViTinh || 'Kg'}</td>
                            <td>${statusHTML}</td>
                            <td>
                                <button class="btn btn-nhap" onclick="nhapThem('${nl.maNL}', '${nl.tenNL}')">➕ Nhập Hàng</button>
                            </td>
                        </tr>
                    `;
                });
            })
            .catch(err => {
                document.getElementById('khoBody').innerHTML = '<tr><td colspan="6" style="color:red">Lỗi kết nối Server!</td></tr>';
            });
    }

    function nhapThem(maNL, tenNL) {
        const soLuong = prompt(`Nhập số lượng nhập thêm cho [${tenNL}]:`, "10");
        if (soLuong === null || soLuong === "" || isNaN(soLuong) || soLuong <= 0) return;

        fetch(`${API_BASE_URL}/kho/nhap-them/${maNL}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ soLuong: parseFloat(soLuong) })
        })
            .then(async res => {
                if(res.ok) {
                    alert(`✅ Đã nhập thêm ${soLuong} vào kho thành công!`);
                    taiDanhSachKho();
                } else {
                    const msg = await res.text();
                    alert("❌ Lỗi: " + msg);
                }
            });
    }
</script>
</body>
</html>
